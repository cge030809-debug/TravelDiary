<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7c8a6" />
    <title>Travel Diary MVP</title>
    <link rel="manifest" href="manifest.json" />
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.26.0/mapbox-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="config.local.js"></script>
    <script defer src="config.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.26.0/mapbox-gl.js"></script>
    <!-- 로컬 설정(Mapbox 토큰 등). app.js 보다 먼저 실행되어야 함. config.local.js 는 gitignore 됨. -->
    <script defer src="app.js?v=20260715a"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="screen screen--create" data-screen="create" aria-labelledby="create-title">
        <div class="brand-badge">Travel Diary</div>
        <div class="hero-copy">
          <h1 id="create-title">새 여행 시작</h1>
          <p>여행 제목과 기본 정보를 입력하고 기록을 시작해 보세요.</p>
          <div class="hero-actions">
            <button class="secondary-button" type="button" id="open-diary-button" data-nav="diary">다이어리 바로가기</button>
          </div>
        </div>

        <form class="card form-card" id="create-form">
          <label>
            <span>여행 제목</span>
            <input id="trip-title" name="tripTitle" type="text" placeholder="위치가 인식되면 자동으로 채워져요" />
          </label>
          <label>
            <span>여행 날짜</span>
            <input id="trip-date" name="tripDate" type="date" required />
          </label>
          <label>
            <span>여행 지역 <span style="font-size: 0.85em; color: #999;">(선택)</span></span>
            <input id="trip-region" name="tripRegion" type="text" placeholder="예: 에스토니아 탈린" />
          </label>
          <div class="mode-actions">
            <button class="primary-button" type="button" id="create-trip-button">🔴 실시간 기록 시작</button>
            <button class="secondary-button" type="button" id="create-upload-button">📷 사진으로 만들기</button>
          </div>
          <p class="mode-hint">여행 중이면 <b>실시간 기록</b>, 이미 찍은 사진이 있으면 <b>사진으로 만들기</b>를 선택하세요.</p>
        </form>
      </section>

      <section class="screen screen--map" data-screen="map" hidden aria-labelledby="map-title">
        <header class="top-bar">
          <div class="segment-tabs" aria-label="화면 전환">
            <button class="segment-button" type="button" data-nav="create">Home</button>
            <button class="segment-button is-active" type="button" data-nav="map">지도</button>
            <button class="segment-button" type="button" data-nav="diary">다이어리</button>
          </div>
          <div class="trip-chip" id="trip-summary-text"></div>
          <div class="map-toolbar">
            <div class="trip-history-label">일자별 보기</div>
            <button class="calendar-toggle" id="calendar-toggle" type="button" aria-label="달력 열기">🗓️</button>
          </div>
          <div class="trip-history-label">일자별 보기</div>
          <div class="trip-history" id="trip-history" aria-label="여행 기록 목록"></div>
        </header>

        <section class="map-stage card" aria-label="여행 지도 화면">
          <div class="map-canvas" aria-label="지도 영역">
            <div id="map" class="mapbox-map"></div>
            <div class="map-overlay">
              <button class="segment-button segment-button--back map-back-button" type="button" data-nav="back" aria-label="이전 화면">←</button>
              <div class="recording-badge" id="recording-badge" hidden>
                <span class="status-pill">기록 중</span>
                <span id="recording-time">00:00:00</span>
              </div>
              <div class="photo-import-panel" id="photo-import-panel" hidden>
                <button class="record-button photo-import-button" type="button" id="photo-import-button">
                  여행 사진 불러오기
                </button>
                <p class="photo-import-progress" id="photo-import-progress" hidden>업로드 준비 중</p>
              </div>
            </div>
          </div>

          <div class="map-controls">
            <button class="record-button" type="button" id="start-recording">기록 시작</button>
            <button class="record-button record-button--live-photo" type="button" id="live-photo-button" hidden>📷 현장 사진</button>
            <button class="record-button record-button--end" type="button" id="end-recording" hidden>기록 종료</button>
          </div>
        </section>
      </section>

      <section class="screen screen--diary" data-screen="diary" hidden aria-labelledby="diary-title">
        <header class="top-bar">
          <div class="segment-tabs" aria-label="화면 전환">
            <button class="segment-button" type="button" data-nav="create">Home</button>
            <button class="segment-button" type="button" data-nav="map">지도</button>
            <button class="segment-button is-active" type="button" data-nav="diary">다이어리</button>
          </div>
          <div class="trip-chip" id="diary-summary-text"></div>
          <div class="map-toolbar">
            <button class="calendar-toggle" id="diary-calendar-toggle" type="button" aria-label="달력 열기">🗓️</button>
          </div>
        </header>

        <section class="diary-shell card">
          <div class="diary-header">
            <div>
              <p class="eyebrow">시간순 기록</p>
              <h2 id="diary-title">여행 다이어리</h2>
            </div>
            <div class="diary-actions">
              <button class="status-pill status-pill--delete" type="button" id="delete-diary-button" aria-label="다이어리 삭제">🗑</button>
              <button class="status-pill status-pill--complete" type="button" id="complete-diary-button" aria-label="다이어리 닫기">🅅</button>
            </div>
          </div>
          <div class="timeline" id="timeline"></div>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" hidden role="status" aria-live="polite">
      <p>오늘의 여정이 다이어리로 정리되었습니다.</p>
    </div>

    <div class="calendar-modal" id="calendar-modal" hidden>
      <button class="calendar-backdrop" type="button" data-calendar-close aria-label="달력 닫기"></button>
      <section class="calendar-sheet" role="dialog" aria-modal="true" aria-labelledby="calendar-title">
        <div class="calendar-head">
          <div>
            <p class="eyebrow">일자별 기록</p>
            <h2 id="calendar-title">달력</h2>
          </div>
          <button class="calendar-close" id="calendar-close" type="button">닫기</button>
        </div>
        <div class="calendar-nav">
          <button class="calendar-nav-button" id="calendar-prev" type="button">이전</button>
          <div class="calendar-month" id="calendar-month-label"></div>
          <button class="calendar-nav-button" id="calendar-next" type="button">다음</button>
        </div>
        <div class="calendar-weekdays" aria-hidden="true">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
        <p class="calendar-empty" id="calendar-empty">저장된 기록이 없는 날짜를 눌러 보세요.</p>
      </section>
    </div>

    <input id="photo-input" type="file" accept="image/*" multiple hidden />
    <input id="live-photo-input" type="file" accept="image/*" capture="environment" hidden />
  </body>
</html>
